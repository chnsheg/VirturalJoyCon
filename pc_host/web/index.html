<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no"
  />
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>JoyCon Web Pad</title>
  <link rel="stylesheet" href="/styles.css?v=stream-20260422-10" />
</head>
<body>
  <section class="stream-stage" aria-label="Remote game stream">
    <video id="remoteVideo" class="remote-video remote-video-hidden" playsinline autoplay muted hidden></video>
    <canvas id="streamBackdropCanvas" class="stream-canvas stream-canvas-backdrop"></canvas>
    <canvas id="streamCanvas" class="stream-canvas stream-canvas-foreground"></canvas>
    <div class="stream-stage-overlay">
      <div id="roomStatus" class="room-status">not connected</div>
      <div id="transportMode" class="transport-mode">control: idle</div>
      <div id="streamTelemetry" class="stream-telemetry" aria-live="polite">
        <div class="stream-telemetry-line">
          <span class="stream-telemetry-segment"><span class="stream-telemetry-label">Protocol</span><span class="stream-telemetry-value">Idle</span></span>
          <span class="stream-telemetry-separator" aria-hidden="true">·</span>
          <span class="stream-telemetry-segment"><span class="stream-telemetry-label">FPS</span><span class="stream-telemetry-value">--</span></span>
          <span class="stream-telemetry-separator" aria-hidden="true">·</span>
          <span class="stream-telemetry-segment"><span class="stream-telemetry-label">Bitrate</span><span class="stream-telemetry-value">--</span></span>
          <span class="stream-telemetry-separator" aria-hidden="true">·</span>
          <span class="stream-telemetry-segment"><span class="stream-telemetry-label">Latency</span><span class="stream-telemetry-value">--</span></span>
          <span class="stream-telemetry-separator" aria-hidden="true">·</span>
          <span class="stream-telemetry-segment"><span class="stream-telemetry-label">Quality</span><span class="stream-telemetry-value">Idle</span></span>
          <span class="stream-telemetry-separator" aria-hidden="true">·</span>
          <span class="stream-telemetry-segment"><span class="stream-telemetry-label">Loss</span><span class="stream-telemetry-value">--</span></span>
        </div>
      </div>
    </div>
  </section>

  <div class="hud">
    <div class="hud-left">
      <div id="conn">WS: host not set</div>
      <div id="host">host: not set</div>
    </div>
    <div class="hud-right">
      <div id="slot">slot: -</div>
    </div>
  </div>

  <button
    id="hostDrawerHandle"
    class="host-drawer-handle"
    type="button"
    aria-label="Edit host target"
    aria-controls="hostDrawer"
    aria-expanded="false"
  ></button>

  <div id="hostDrawerBackdrop" class="host-drawer-backdrop" hidden></div>

  <aside id="hostDrawer" class="host-drawer" aria-label="Host connection settings">
    <form id="hostTargetForm" class="host-drawer-form">
      <label class="host-drawer-label" for="hostTargetInput">Host</label>
      <input
        id="hostTargetInput"
        class="host-drawer-input"
        type="text"
        inputmode="text"
        autocomplete="off"
        spellcheck="false"
        placeholder="192.168.0.10:8082"
      />
      <label class="host-drawer-label" for="stickSensitivityInput">Stick sensitivity</label>
      <div class="host-drawer-range-row">
        <input
          id="stickSensitivityInput"
          class="host-drawer-range"
          type="range"
          min="0"
          max="1"
          step="0.01"
          value="0.68"
        />
        <output id="stickSensitivityValue" class="host-drawer-value" for="stickSensitivityInput">68%</output>
      </div>
      <label class="host-drawer-label" for="controlOpacityInput">Button opacity</label>
      <div class="host-drawer-range-row">
        <input
          id="controlOpacityInput"
          class="host-drawer-range"
          type="range"
          min="0.05"
          max="0.65"
          step="0.01"
          value="0.18"
        />
        <output id="controlOpacityValue" class="host-drawer-value" for="controlOpacityInput">18%</output>
      </div>
      <label class="host-drawer-toggle-row" for="controllerVisibleInput">
        <span class="host-drawer-toggle-copy">
          <span class="host-drawer-section-title">Controller</span>
          <span class="host-drawer-status">Show on-screen controls</span>
        </span>
        <input id="controllerVisibleInput" class="host-drawer-toggle-input" type="checkbox" checked />
      </label>
      <label class="host-drawer-toggle-row" for="hudVisibleInput">
        <span class="host-drawer-toggle-copy">
          <span class="host-drawer-section-title">HUD</span>
          <span class="host-drawer-status">Show compact telemetry</span>
        </span>
        <input id="hudVisibleInput" class="host-drawer-toggle-input" type="checkbox" checked />
      </label>
      <div class="host-drawer-section">
        <div class="host-drawer-section-title">Stream</div>
        <div class="host-drawer-grid">
          <label class="host-drawer-field" for="videoWidthInput">
            <span>Width</span>
            <input id="videoWidthInput" class="host-drawer-input" type="number" inputmode="numeric" min="640" max="3840" step="2" value="1280" />
          </label>
          <label class="host-drawer-field" for="videoHeightInput">
            <span>Height</span>
            <input id="videoHeightInput" class="host-drawer-input" type="number" inputmode="numeric" min="360" max="2160" step="2" value="720" />
          </label>
          <label class="host-drawer-field" for="videoFpsInput">
            <span>FPS</span>
            <input id="videoFpsInput" class="host-drawer-input" type="number" inputmode="numeric" min="24" max="120" step="1" value="60" />
          </label>
          <label class="host-drawer-field" for="videoBitrateInput">
            <span>Bitrate Kbps</span>
            <input id="videoBitrateInput" class="host-drawer-input" type="number" inputmode="numeric" min="1500" max="50000" step="100" value="6000" />
          </label>
        </div>
        <button id="streamSettingsSave" class="host-drawer-save host-drawer-save-secondary" type="button">Apply Stream</button>
        <div id="streamSettingsStatus" class="host-drawer-status" aria-live="polite"></div>
      </div>
      <button id="fullscreenPlayback" class="host-drawer-save host-drawer-save-secondary" type="button">Fullscreen</button>
      <button id="hostTargetSave" class="host-drawer-save" type="submit">Connect</button>
      <div id="hostTargetStatus" class="host-drawer-status" aria-live="polite"></div>
    </form>
  </aside>

  <div id="latency" class="latency is-stale" aria-live="polite">--</div>

  <main class="controller" aria-label="JoyCon Web Pad">
    <section class="cluster trigger-cluster left">
      <button class="trigger trigger-left" id="leftTrigger" aria-label="LT">
        <span class="trigger-track"></span>
        <span class="trigger-fill"></span>
        <span class="trigger-knob"></span>
        <span class="trigger-label">LT</span>
      </button>
    </section>

    <section class="cluster dpad-cluster" aria-label="D-pad">
      <div class="dpad">
        <div class="dpad-slot"></div>
        <button class="btn" data-btn="dpad_up" aria-label="D-pad up">▲</button>
        <div class="dpad-slot"></div>
        <button class="btn" data-btn="dpad_left" aria-label="D-pad left">◀</button>
        <div class="dpad-slot"></div>
        <button class="btn" data-btn="dpad_right" aria-label="D-pad right">▶</button>
        <div class="dpad-slot"></div>
        <button class="btn" data-btn="dpad_down" aria-label="D-pad down">▼</button>
        <div class="dpad-slot"></div>
      </div>
    </section>

    <section class="cluster abxy-cluster" aria-label="Face buttons">
      <div class="abxy">
        <button class="face-btn y" data-btn="y" aria-label="Y">Y</button>
        <button class="face-btn x" data-btn="x" aria-label="X">X</button>
        <button class="face-btn b" data-btn="b" aria-label="B">B</button>
        <button class="face-btn a" data-btn="a" aria-label="A">A</button>
      </div>
    </section>

    <section class="cluster trigger-cluster right">
      <button class="trigger trigger-right" id="rightTrigger" aria-label="RT">
        <span class="trigger-track"></span>
        <span class="trigger-fill"></span>
        <span class="trigger-knob"></span>
        <span class="trigger-label">RT</span>
      </button>
    </section>

    <button class="meta-btn aux-left" data-btn="ls" aria-label="Left stick click">LS</button>
    <button class="meta-btn aux-right" data-btn="rs" aria-label="Right stick click">RS</button>

    <button class="shoulder-btn lb" data-btn="lb" aria-label="LB">LB</button>
    <button class="shoulder-btn rb" data-btn="rb" aria-label="RB">RB</button>
    <button class="system-btn select" data-btn="select" aria-label="Select">SELECT</button>
    <button class="system-btn start" data-btn="start" aria-label="Start">START</button>

    <section class="stick-shell left-stick-shell" aria-label="Left stick">
      <div class="stick" id="leftStick">
        <span class="stick-arrow up">▲</span>
        <span class="stick-arrow right">▶</span>
        <span class="stick-arrow down">▼</span>
        <span class="stick-arrow left">◀</span>
        <div class="stick-knob"></div>
      </div>
    </section>

    <section class="stick-shell right-stick-shell" aria-label="Right stick">
      <div class="stick" id="rightStick">
        <span class="stick-arrow up">▲</span>
        <span class="stick-arrow right">▶</span>
        <span class="stick-arrow down">▼</span>
        <span class="stick-arrow left">◀</span>
        <div class="stick-knob"></div>
      </div>
    </section>
  </main>

  <script type="module" src="/app.mjs?v=stream-20260423-4"></script>
</body>
</html>
